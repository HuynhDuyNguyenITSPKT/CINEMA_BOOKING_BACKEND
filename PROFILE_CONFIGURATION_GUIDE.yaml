# Spring Profiles Configuration Guide
# Dùng để activate MockMovieFacade (dev) hoặc MovieFacadeImpl (prod)

## DEV PROFILE (Local Development)
# 
# File: application-dev.yaml
# Activation: spring.profiles.active=dev

spring:
  application:
    name: cinema-booking-backend

  jpa:
    hibernate:
      ddl-auto: create-drop  # ← Recreate DB each startup
    show-sql: true           # ← Show SQL queries
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

  datasource:
    url: jdbc:mysql://localhost:3306/cinema_booking_dev
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

logging:
  level:
    root: INFO
    com.movie.cinema_booking_backend: DEBUG  # ← More detailed logs
    org.hibernate.SQL: DEBUG

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

# ⭐ KEY: Facades use @Profile("dev")
# MockMovieFacade @Component is activated
# - BookingService receives MockMovieFacade
# - getMovieById() returns hardcoded test data
# - FAST development without waiting for other teams
---

## PROD PROFILE (Production)
#
# File: application-prod.yaml
# Activation: spring.profiles.active=prod

spring:
  application:
    name: cinema-booking-backend

  jpa:
    hibernate:
      ddl-auto: update  # ← Only update schema
    show-sql: false     # ← Don't show SQL in prod
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.MySQL8Dialect

  datasource:
    url: jdbc:mysql://prod-db-server:3306/cinema_booking
    username: ${DB_USER}           # ← Environment variable
    password: ${DB_PASSWORD}       # ← Environment variable
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

logging:
  level:
    root: WARN
    com.movie.cinema_booking_backend: INFO  # ← Less verbose in prod

server:
  port: 8080
  error:
    include-message: on_param
    include-binding-errors: on_param

# ⭐ KEY: Facades use @Profile("prod")
# MovieFacadeImpl @Component is activated
# - BookingService receives MovieFacadeImpl
# - getMovieById() calls real MovieService → queries database
# - REAL data flows through system
