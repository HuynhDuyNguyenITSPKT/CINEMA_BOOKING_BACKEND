spring:
  config:
    import: "optional:file:.env[.properties]"
  messages:
    encoding: UTF-8
  application:
    name: CINEMA_BOOKING_BACKEND
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
  security:
    jwt:
      signerKey: ${JWT_SIGNER_KEY}
      access-token-expiry: ${JWT_ACCESS_TOKEN_EXPIRY:3600} # 1 hour (seconds)
      refresh-token-expiry: ${JWT_REFRESH_TOKEN_EXPIRY:604800} # 7 days (seconds)
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            scope:
              - email
              - profile
              - phone
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth?prompt=select_account

server:
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
app:
  frontend:
    url: ${FRONTEND_URL:http://localhost:5173}
    oauth2:
      callback-url: ${FRONTEND_OAUTH2_CALLBACK_URL:http://localhost:5173/oauth2/callback}
  auth:
    oauth2-code:
      ttl-seconds: ${OAUTH2_CODE_TTL_SECONDS:60}
payment:
  vnpay:
    pay-url: ${VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
    return-url: ${VNPAY_RETURN_URL:http://localhost:8080/api/payment/callback/vnpay}
    tmn-code: ${VNPAY_TMN_CODE}
    secret-key: ${VNPAY_SECRET_KEY}
    version: ${VNPAY_VERSION:2.1.0}
    command: ${VNPAY_COMMAND:pay}
  momo:
    partner-code: ${MOMO_PARTNER_CODE:MOMO}
    access-key: ${MOMO_ACCESS_KEY}
    secret-key: ${MOMO_SECRET_KEY}
    endpoint: ${MOMO_ENDPOINT:https://test-payment.momo.vn/v2/gateway/api}
    return-url: ${MOMO_RETURN_URL:http://localhost:8080/api/payment/callback/momo}
    ipn-url: ${MOMO_IPN_URL:http://localhost:8080/api/payment/callback/momo}
    request-type: ${MOMO_REQUEST_TYPE:payWithATM}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}