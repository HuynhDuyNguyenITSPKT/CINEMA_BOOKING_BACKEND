<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sepay Checkout</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #0f172a;
      --muted: #334155;
      --accent: #0f766e;
      --accent-soft: #14b8a6;
      --panel: rgba(255, 255, 255, 0.85);
      --shadow: 0 18px 45px rgba(15, 23, 42, 0.18);
      --radius: 22px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Space Grotesk", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 18%, #99f6e4 0%, transparent 38%),
        radial-gradient(circle at 85% 12%, #bae6fd 0%, transparent 35%),
        linear-gradient(140deg, #f0fdfa 0%, #ecfeff 50%, #f8fafc 100%);
      display: grid;
      place-items: center;
      padding: 22px;
      animation: reveal 0.7s ease-out;
    }

    .wrap {
      width: min(980px, 100%);
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 24px;
    }

    .card {
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(7px);
      padding: 28px;
    }

    .intro h1 {
      margin: 0 0 10px;
      line-height: 1.05;
      font-size: clamp(2rem, 5vw, 3.1rem);
      letter-spacing: -0.04em;
    }

    .badge {
      display: inline-block;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(15, 118, 110, 0.14);
      color: var(--accent);
      font-weight: 700;
      margin-bottom: 16px;
      letter-spacing: 0.01em;
    }

    .meta {
      display: grid;
      gap: 10px;
      margin-top: 18px;
      color: var(--muted);
      font-size: 0.98rem;
    }

    .meta-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      border-bottom: 1px dashed rgba(51, 65, 85, 0.2);
      padding-bottom: 9px;
    }

    .qr-card {
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .qr-card::before {
      content: "";
      position: absolute;
      width: 280px;
      height: 280px;
      border-radius: 50%;
      top: -140px;
      right: -120px;
      background: radial-gradient(circle, rgba(20, 184, 166, 0.27), rgba(20, 184, 166, 0));
      pointer-events: none;
    }

    .qr-frame {
      width: min(335px, 100%);
      margin: 14px auto 18px;
      background: #fff;
      border-radius: 18px;
      border: 1px solid rgba(148, 163, 184, 0.35);
      padding: 14px;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.7);
    }

    .qr-frame img {
      width: 100%;
      border-radius: 10px;
      display: block;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-top: 8px;
    }

    button,
    .link-btn {
      border: none;
      border-radius: 999px;
      padding: 10px 16px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    button:hover,
    .link-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 18px rgba(15, 23, 42, 0.12);
    }

    .primary {
      background: linear-gradient(130deg, #0f766e, #14b8a6);
      color: #fff;
    }

    .ghost {
      background: rgba(15, 118, 110, 0.1);
      color: #115e59;
    }

    .hint {
      margin-top: 14px;
      color: #475569;
      font-size: 0.92rem;
    }

    @keyframes reveal {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 860px) {
      .wrap {
        grid-template-columns: 1fr;
      }

      .card {
        padding: 22px;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card intro">
      <span class="badge">SEPAY QR PAYMENT</span>
      <h1>Scan QR de thanh toan nhanh</h1>
      <p>Quet bang app bank, kiem tra so tien va noi dung, sau do xac nhan giao dich.</p>

      <div class="meta">
        <div class="meta-row">
          <strong>So tien</strong>
          <span id="amount">-</span>
        </div>
        <div class="meta-row">
          <strong>Booking</strong>
          <span id="bookingId">-</span>
        </div>
        <div class="meta-row">
          <strong>Ngan hang</strong>
          <span id="bank">-</span>
        </div>
        <div class="meta-row">
          <strong>Tai khoan nhan</strong>
          <span id="account">-</span>
        </div>
        <div class="meta-row">
          <strong>Noi dung CK</strong>
          <span id="description">-</span>
        </div>
      </div>
    </section>

    <section class="card qr-card">
      <h2>QR thanh toan</h2>
      <div class="qr-frame">
        <img id="qrImage" alt="Sepay QR" />
      </div>
      <div class="actions">
        <button id="copyDes" class="primary" type="button">Copy noi dung CK</button>
        <a id="openQr" class="link-btn ghost" target="_blank" rel="noopener">Mo anh QR</a>
      </div>
      <p class="hint">Neu QR khong hien, vui long kiem tra lai URL dau vao.</p>
    </section>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);

    const qr = params.get("qr") || "";
    const amount = params.get("amount") || "0";
    const bookingId = params.get("bookingId") || "N/A";
    const description = params.get("description") || "Thanh toan ve xem phim";
    const bank = params.get("bank") || "Vietcombank";
    const account = params.get("account") || "";

    const amountNumber = Number(amount) || 0;
    const formattedAmount = new Intl.NumberFormat("vi-VN").format(amountNumber) + " VND";

    document.getElementById("amount").textContent = formattedAmount;
    document.getElementById("bookingId").textContent = bookingId;
    document.getElementById("description").textContent = description;
    document.getElementById("bank").textContent = bank;
    document.getElementById("account").textContent = account;

    const qrImage = document.getElementById("qrImage");
    qrImage.src = qr;

    const openQr = document.getElementById("openQr");
    openQr.href = qr;

    document.getElementById("copyDes").addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(description);
        const btn = document.getElementById("copyDes");
        btn.textContent = "Da copy";
        setTimeout(() => {
          btn.textContent = "Copy noi dung CK";
        }, 1400);
      } catch (e) {
        alert("Khong copy duoc. Vui long copy thu cong.");
      }
    });
  </script>
</body>
</html>
